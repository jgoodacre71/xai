datasets:
  mvtec_ad:
    name: "MVTec AD"
    status: "supported"
    purpose:
      - "PatchCore baseline"
      - "nearest-normal patch provenance"
      - "nuisance contamination experiments"
    raw_data_committed: false
    licence: "Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)"
    licence_url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    restrictions:
      - "Non-commercial use only."
      - "Raw archives and extracted data must not be committed."
    source_url: "https://www.mvtec.com/research-teaching/datasets/mvtec-ad"
    download_url: "https://www.mvtec.com/research-teaching/datasets/mvtec-ad/downloads"
    citation: "Bergmann et al., MVTec AD - A Comprehensive Real-World Dataset for Unsupervised Anomaly Detection."
    expected_layout:
      raw_archives: "data/raw/mvtec_ad/archives/<category>.tar.xz"
      interim_extracted: "data/interim/mvtec_ad/<category>/"
      processed_manifest: "data/processed/mvtec_ad/<category>/manifest.jsonl"
    categories:
      - "bottle"
      - "cable"
      - "capsule"
      - "carpet"
      - "grid"
      - "hazelnut"
      - "leather"
      - "metal_nut"
      - "pill"
      - "screw"
      - "tile"
      - "toothbrush"
      - "transistor"
      - "wood"
      - "zipper"
  mvtec_loco_ad:
    name: "MVTec LOCO AD"
    status: "supported"
    purpose:
      - "logical anomaly limitations"
      - "structure versus logic comparisons"
    raw_data_committed: false
    licence: "Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)"
    licence_url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    restrictions:
      - "Non-commercial use only."
      - "Raw archives and extracted data must not be committed."
    source_url: "https://www.mvtec.com/research-teaching/datasets/mvtec-loco-ad"
    download_url: "https://www.mvtec.com/research-teaching/datasets/mvtec-loco-ad/downloads"
    citation: "Bergmann et al., The MVTec LOCO AD Dataset for Logical Constraint Anomaly Detection."
    expected_layout:
      raw_archives: "data/raw/mvtec_loco_ad/archives/<category>.tar.xz"
      interim_extracted: "data/interim/mvtec_loco_ad/<category>/"
      processed_manifest: "data/processed/mvtec_loco_ad/<category>/manifest.jsonl"
    categories:
      - "breakfast_box"
      - "juice_bottle"
      - "pushpins"
      - "screw_bag"
      - "splicing_connectors"
  waterbirds:
    name: "Waterbirds"
    status: "supported"
    purpose:
      - "canonical spurious-correlation classification"
      - "background reliance and counterfactual swaps"
    raw_data_committed: false
    licence: "Verify upstream CUB and Places terms before use."
    restrictions:
      - "Treat as research-only unless upstream terms clearly allow more."
      - "Raw archives and extracted data must not be committed."
    source_url: "https://github.com/kohpangwei/group_DRO"
    download_url: "https://nlp.stanford.edu/data/dro/waterbird_complete95_forest2water2.tar.gz"
    citation: "Sagawa et al., Distributionally Robust Neural Networks for Group Shifts."
    expected_layout:
      raw_archives: "data/raw/waterbirds/archives/<category>.tar.gz"
      interim_extracted: "data/interim/waterbirds/<category>/"
      processed_manifest: "data/processed/waterbirds/<category>/manifest.jsonl"
    categories:
      - "waterbird_complete95_forest2water2"
  mvtec_ad_2:
    name: "MVTec AD 2"
    status: "supported"
    purpose:
      - "second-wave industrial anomaly detection"
      - "harder acquisition and realism stress tests"
      - "future PatchCore robustness evaluation"
    raw_data_committed: false
    licence: "Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)"
    licence_url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    restrictions:
      - "Non-commercial use only."
      - "Raw archives and extracted data must not be committed."
    source_url: "https://www.mvtec.com/research-teaching/datasets/mvtec-ad-2"
    download_url: "https://www.mvtec.com/research-teaching/datasets/mvtec-ad-2"
    citation: "Bergmann et al., MVTec AD 2 - Advanced Scenarios for Unsupervised Anomaly Detection."
    expected_layout:
      raw_archives: "data/raw/mvtec_ad_2/archives/<downloaded-archive>"
      interim_extracted: "data/interim/mvtec_ad_2/"
      processed_manifest: "data/processed/mvtec_ad_2/<scenario>/manifest.jsonl"
    categories:
      - "<scenario discovered at prepare time>"
  metashift:
    name: "MetaShift"
    status: "supported"
    purpose:
      - "natural-context shortcut learning beyond Waterbirds"
      - "subpopulation shift diagnostics for object/context leakage"
      - "future Pillar A natural-scene extension"
    raw_data_committed: false
    licence: "MIT repository plus upstream Visual Genome / GQA terms."
    restrictions:
      - "Treat generated image splits as research-only until upstream Visual Genome / GQA terms have been checked."
      - "Generated image splits and processed manifests must not be committed."
    source_url: "https://github.com/Weixin-Liang/MetaShift"
    download_url: "https://metashift.readthedocs.io/en/latest/sub_pages/applications.html"
    citation: "Liang and Zou, MetaShift: A Dataset of Datasets for Evaluating Context Sensitivity and Distribution Shifts in Images."
    expected_layout:
      external_generated_split: "data/external/metashift/MetaShift-subpopulation-shift/"
      processed_manifest: "data/processed/metashift/subpopulation_shift_cat_dog_indoor_outdoor/manifest.jsonl"
    categories:
      - "subpopulation_shift_cat_dog_indoor_outdoor"
  visa:
    name: "VisA"
    status: "supported"
    purpose:
      - "second-wave industrial anomaly detection"
      - "cross-dataset anomaly stress tests beyond MVTec"
      - "future PatchCore generalisation checks"
    raw_data_committed: false
    licence: "Creative Commons Attribution 4.0 International (CC BY 4.0)"
    licence_url: "https://creativecommons.org/licenses/by/4.0/"
    restrictions:
      - "Raw archives, split CSV files, extracted data, and processed manifests must not be committed."
    source_url: "https://github.com/amazon-science/spot-diff"
    download_url: "https://amazon-visual-anomaly.s3.us-west-2.amazonaws.com/VisA_20220922.tar"
    citation: "Zou et al., Spot-the-Difference Self-supervised Pre-training for Anomaly Detection and Segmentation."
    expected_layout:
      raw_archives: "data/raw/visa/archives/VisA_20220922.tar"
      raw_split_csv: "data/raw/visa/splits/1cls.csv"
      interim_extracted: "data/interim/visa/raw/"
      interim_prepared: "data/interim/visa/1cls/<category>/"
      processed_manifest: "data/processed/visa/<category>/manifest.jsonl"
    categories:
      - "<category discovered from the published 1-class split>"
