    claim: "A plausible heatmap does not identify the controlling factor."
    layout: "heatmap_caution"
    equation_assets:
      - "assets/equations/svg/smoothgrad.svg"
    image_assets:
      - "assets/images/slide_plates/plate_09_xai_heatmap_caution.png"
    video_assets: []
    fallback_assets: []
    playback: "none"
    speaker_note: "The counterfactual identifies control; the heatmap is supporting evidence."
  - number: 12
